name: Daily update

on:
  schedule:
    # 07:00 UTC ≈ 08:00 Bruxelles (hiver) / 09:00 (été)
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/fetch-odds.mjs

      - name: Generate AI summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-summary.mjs

      - name: Commit data
        run: |
          git config user.name "cronos-pronos-bot"
          git config user.email "bot@cronos-pronos.local"
          git add data/
          if git diff --staged --quiet; then
            echo "Pas de changement de données."
          else
            git commit -m "Daily update: $(date -u +%Y-%m-%d)"
            git push
          fi
